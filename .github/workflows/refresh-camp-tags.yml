name: Refresh camps.ca Category Tags

on:
  schedule:
    - cron: '0 3 * * 0'   # Sunday 03:00 UTC (Saturday night North America)
  workflow_dispatch:        # manual trigger from GitHub UI

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write       # needed to commit updated camp_tag_overrides.json

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install mysql-connector-python

      - name: Scrape camps.ca category pages → update program_tags
        run: python db/tag_from_campsca_pages.py
        env:
          DB_HOST:        ${{ secrets.DB_HOST }}
          DB_PORT:        ${{ secrets.DB_PORT }}
          DB_NAME:        ${{ secrets.DB_NAME }}
          DB_USER:        ${{ secrets.DB_USER }}
          DB_PASSWORD:    ${{ secrets.DB_PASSWORD }}
          DB_SSL_CA_CERT: ${{ secrets.DB_SSL_CA_CERT }}

      - name: Export updated camp_tag_overrides.json
        run: PYTHONPATH=. python db/export_camp_tag_overrides.py
        env:
          DB_HOST:        ${{ secrets.DB_HOST }}
          DB_PORT:        ${{ secrets.DB_PORT }}
          DB_NAME:        ${{ secrets.DB_NAME }}
          DB_USER:        ${{ secrets.DB_USER }}
          DB_PASSWORD:    ${{ secrets.DB_PASSWORD }}
          DB_SSL_CA_CERT: ${{ secrets.DB_SSL_CA_CERT }}

      - name: Commit if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add db/camp_tag_overrides.json
          if git diff --cached --quiet; then
            echo "No changes to camp_tag_overrides.json — nothing to commit"
          else
            git commit -m "chore: refresh camp tag overrides from camps.ca [skip ci]"
            git push
          fi
