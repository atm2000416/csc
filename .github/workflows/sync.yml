name: Sync OurKids → Aiven

on:
  schedule:
    - cron: '0 2 * * 1-5'   # 02:00 UTC Mon–Fri
  workflow_dispatch:          # manual trigger from GitHub UI

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write         # needed to commit updated camp_tag_overrides.json

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install mysql-connector-python google-api-python-client google-auth

      - name: Download dump from Google Drive
        run: python db/download_from_drive.py
        env:
          GDRIVE_SERVICE_ACCOUNT_JSON: ${{ secrets.GDRIVE_SERVICE_ACCOUNT_JSON }}
          GDRIVE_FOLDER_ID:            ${{ secrets.GDRIVE_FOLDER_ID }}

      - name: Load raw OurKids tables
        run: PYTHONPATH=. python db/load_raw_tables.py --dump dump.sql
        env:
          DB_HOST:        ${{ secrets.DB_HOST }}
          DB_PORT:        ${{ secrets.DB_PORT }}
          DB_NAME:        ${{ secrets.DB_NAME }}
          DB_USER:        ${{ secrets.DB_USER }}
          DB_PASSWORD:    ${{ secrets.DB_PASSWORD }}
          DB_SSL_CA_CERT: ${{ secrets.DB_SSL_CA_CERT }}

      - name: Materialize CSC tables from raw
        run: >
          PYTHONPATH=. python db/materialize_from_raw.py
          --skip-ids 422,529,579,1647
          --deactivate
          --force
        env:
          DB_HOST:        ${{ secrets.DB_HOST }}
          DB_PORT:        ${{ secrets.DB_PORT }}
          DB_NAME:        ${{ secrets.DB_NAME }}
          DB_USER:        ${{ secrets.DB_USER }}
          DB_PASSWORD:    ${{ secrets.DB_PASSWORD }}
          DB_SSL_CA_CERT: ${{ secrets.DB_SSL_CA_CERT }}

      - name: Re-apply camps.ca scraped tags
        run: PYTHONPATH=. python db/import_camp_tag_overrides.py
        env:
          DB_HOST:        ${{ secrets.DB_HOST }}
          DB_PORT:        ${{ secrets.DB_PORT }}
          DB_NAME:        ${{ secrets.DB_NAME }}
          DB_USER:        ${{ secrets.DB_USER }}
          DB_PASSWORD:    ${{ secrets.DB_PASSWORD }}
          DB_SSL_CA_CERT: ${{ secrets.DB_SSL_CA_CERT }}

      - name: Export camp_tag_overrides.json
        run: PYTHONPATH=. python db/export_camp_tag_overrides.py
        env:
          DB_HOST:        ${{ secrets.DB_HOST }}
          DB_PORT:        ${{ secrets.DB_PORT }}
          DB_NAME:        ${{ secrets.DB_NAME }}
          DB_USER:        ${{ secrets.DB_USER }}
          DB_PASSWORD:    ${{ secrets.DB_PASSWORD }}
          DB_SSL_CA_CERT: ${{ secrets.DB_SSL_CA_CERT }}

      - name: Commit if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add db/camp_tag_overrides.json
          if git diff --cached --quiet; then
            echo "No changes to camp_tag_overrides.json"
          else
            git commit -m "chore: sync camp tag overrides [skip ci]"
            git push
          fi
